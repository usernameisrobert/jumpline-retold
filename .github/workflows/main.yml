name: Deploy Raylib Game to GitHub Pages

on:
  push:
    branches:
      - main # Change this to 'master' if your default branch is master

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64 # Stable Emscripten version

      - name: Install Raylib Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y alsa-utils libasound2-dev libx11-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev libxkbcommon-dev

      - name: Download and Build Raylib for Web
        run: |
          git clone https://github.com/raysan5/raylib.git raylib-src
          cd raylib-src/src
          make PLATFORM=PLATFORM_WEB EMSDK_PATH=$EMSDK

      - name: Compile Game using Makefile
        run: |
          mkdir -p build
          # We pass PLATFORM=PLATFORM_WEB and the EMSDK path to your Makefile.
          # If your Makefile requires specific flags or a specific target (e.g., 'make web'), 
          # you can adjust this command (e.g., 'make PLATFORM=PLATFORM_WEB web').
          make PLATFORM=PLATFORM_WEB RAYLIB_SRC_PATH=./raylib-src

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build' # Make sure your Makefile outputs index.html, index.js, and index.wasm here

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
