name: Build Raylib Game for Windows

on:
  push:
    branches:
      - main # Change this to 'master' if your default branch is master

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MinGW (GCC)
        uses: egor-tisin/setup-gcc@v1
        with:
          version: '12.2.0' # Stable GCC version for Windows compilation

      - name: Download and Build Raylib for Windows
        shell: cmd
        run: |
          git clone --depth 1 https://github.com/raysan5/raylib.git raylib-src
          cd raylib-src\src
          :: Build raylib using mingw32-make
          mingw32-make PLATFORM=PLATFORM_DESKTOP

      - name: Compile Game using Makefile
        shell: cmd
        run: |
          mkdir build
          :: Adjust this command to match how your specific Makefile compiles on Windows.
          :: We pass the path where we just compiled the desktop version of Raylib.
          mingw32-make PLATFORM=PLATFORM_DESKTOP RAYLIB_SRC_PATH=.\raylib-src
          
          :: If your Makefile doesn't automatically move the final .exe to \build, 
          :: uncomment and adjust the line below:
          :: move your_game.exe build\

      - name: Upload Windows Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: raylib-game-windows
          path: build/
