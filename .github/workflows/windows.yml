name: Build Raylib Game for Windows

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSVC (Visual Studio Compiler)
        uses: ilammy/msvc-dev-cmd@v1

      - name: Download and Build Raylib via CMake
        shell: cmd
        run: |
          git clone --depth 1 https://github.com/raysan5/raylib.git raylib-src
          mkdir raylib-build
          cd raylib-build
          
          :: Configure and build Raylib using CMake with MSVC static runtime
          cmake -G "Visual Studio 17 2022" -A x64 -DBUILD_EXAMPLES=OFF ..\raylib-src
          cmake --build . --config Release

      - name: Compile Game to Windows EXE (No Console Window)
        shell: cmd
        run: |
          mkdir build
          
          :: Added /std:c23 to enforce C23 standard
          :: Added /link /subsystem:windows /ENTRY:mainCRTStartup to hide the console window
          cl.exe /std:c23 main.c /I"./raylib-src/src" /Fo:build/ /Fe:build/my_raylib_game.exe /MD /O2 /link /LIBPATH:"./raylib-build/raylib/Release" raylib.lib user32.lib gdi32.lib winmm.lib shell32.lib /subsystem:windows /ENTRY:mainCRTStartup

      - name: Copy Assets to Build Folder
        shell: cmd
        run: |
          if exist assets xcopy /E /I /Y assets build\assets

      - name: Upload Windows Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Raylib-Windows-Build
          path: build/
