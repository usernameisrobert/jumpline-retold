<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>Raylib Web Game</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        /* This keeps the canvas constrained to its actual code resolution */
        canvas.emscripten {
            border: 0 none;
            background-color: black;
            display: block;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>

    <script type='text/javascript'>
        var Module = {
            canvas: (function() {
                var canvas = document.getElementById('canvas');
                return canvas;
            })()
        };
    </script>
    {{{ SCRIPT }}}
</body>
</html>
